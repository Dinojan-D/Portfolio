name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload specific directories (HTML, CSS, JS, images, videos, JSON)
        uses: actions/upload-pages-artifact@v3
        with:
          path: |
            ./  # inclure tout le contenu du dépôt
            scripts/
            stylesheets/
            Assets/
            videos/
            translations/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
